<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Warme lichte achtergrond, iOS-stijl afgeronde hoeken -->
  <rect width="100" height="100" rx="22" fill="#faf7f3"/>

  <!-- Capsule (folie bovenaan de fles) -->
  <rect x="42" y="11" width="16" height="12" rx="4" fill="#5b1212"/>

  <!-- Hals -->
  <rect x="43.5" y="22" width="13" height="20" fill="#7c1d1d"/>

  <!-- Schouder (trapezium van hals naar romp) -->
  <path d="M43.5 42 L56.5 42 L68 57 L32 57 Z" fill="#7c1d1d"/>

  <!-- Romp -->
  <rect x="32" y="55" width="36" height="31" rx="7" fill="#7c1d1d"/>

  <!-- Label (crème) -->
  <rect x="35.5" y="60" width="29" height="19" rx="3" fill="#fdf4e7"/>

  <!-- Subtiele lichtreflectie op romp -->
  <rect x="34.5" y="43" width="3.5" height="36" rx="1.75" fill="white" opacity="0.12"/>
  <!-- Subtiele lichtreflectie op hals -->
  <rect x="46" y="23" width="2.5" height="18" rx="1.25" fill="white" opacity="0.18"/>
</svg>
